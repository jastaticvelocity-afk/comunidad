<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Comunidad</title>

<style>
body {
    font-family: Arial;
    background: #1e1e1e;
    color: white;
    text-align: center;
}
input, button {
    margin: 5px;
    padding: 8px;
}
#foro {
    margin-top: 20px;
}
.post {
    background: #333;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🔥 Comunidad Básica</h1>

<div id="registro">
    <h2>Registro</h2>
    <input id="correo" placeholder="Correo"><br>
    <input id="usuario" placeholder="Apodo"><br>
    <input id="codigo" placeholder="Código 3 letras"><br>
    <input id="password" type="password" placeholder="Contraseña"><br>
    <button onclick="registrar()">Registrarse</button>
</div>

<div id="login">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Usuario"><br>
    <input id="loginPass" type="password" placeholder="Contraseña"><br>
    <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">
    <h2 id="bienvenida"></h2>

    <h3>Publicar</h3>
    <input id="mensaje" placeholder="Escribe algo...">
    <button onclick="publicar()">Enviar</button>

    <h3>Foro</h3>
    <div id="foro"></div>

    <h3>🏆 Top Usuarios</h3>
    <div id="top"></div>
</div>

<script>

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let actual = null;

function registrar() {
    let user = {
        correo: correo.value,
        usuario: usuario.value,
        codigo: codigo.value,
        password: password.value,
        puntos: 0
    };

    usuarios.push(user);
    localStorage.setItem("usuarios", JSON.stringify(usuarios));
    alert("Registrado!");
}

function login() {
    let u = usuarios.find(x => x.usuario == loginUser.value && x.password == loginPass.value);
    
    if (u) {
        actual = u;
        document.getElementById("app").style.display = "block";
        bienvenida.innerText = "Bienvenido " + actual.usuario;
        cargar();
    } else {
        alert("Error");
    }
}

function publicar() {
    let post = {
        user: actual.usuario,
        texto: mensaje.value
    };

    posts.push(post);
    actual.puntos += 5;

    localStorage.setItem("posts", JSON.stringify(posts));
    localStorage.setItem("usuarios", JSON.stringify(usuarios));

    cargar();
}

function cargar() {
    foro.innerHTML = "";
    posts.forEach(p => {
        foro.innerHTML += `<div class="post"><b>${p.user}</b>: ${p.texto}</div>`;
    });

    let ranking = usuarios.sort((a,b) => b.puntos - a.puntos);

    top.innerHTML = "";
    ranking.forEach(u => {
        top.innerHTML += `<div>${u.usuario} - ${u.puntos} pts</div>`;
    });
}

</script>

</body>
</html>
