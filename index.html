<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Comunidad</title>

<style>
body {
    font-family: Arial;
    background: #1e1e1e;
    color: white;
    text-align: center;
}
input, button {
    margin: 5px;
    padding: 8px;
}
#foro {
    margin-top: 20px;
}
.post {
    background: #333;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🔥 Comunidad Básica</h1>

<div id="login">
    <h2>Login (simple)</h2>
    <input id="loginUser" placeholder="Usuario"><br>
    <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">
    <h2 id="bienvenida"></h2>

    <h3>Publicar</h3>
    <input id="mensaje" placeholder="Escribe algo...">
    <button onclick="publicar()">Enviar</button>

    <h3>Foro</h3>
    <div id="foro"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let actual = null;

/* LOGIN SIMPLE */
window.login = function () {
    actual = loginUser.value;

    document.getElementById("app").style.display = "block";
    bienvenida.innerText = "Bienvenido " + actual;

    cargar();
};

/* PUBLICAR EN FIREBASE */
window.publicar = async function () {
    await addDoc(collection(db, "posts"), {
        user: actual,
        texto: mensaje.value
    });

    mensaje.value = "";
    cargar();
};

/* CARGAR POSTS */
async function cargar() {
    foro.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "posts"));

    querySnapshot.forEach((doc) => {
        const p = doc.data();
        foro.innerHTML += `<div class="post"><b>${p.user}</b>: ${p.texto}</div>`;
    });
}
</script>

</body>
</html>
